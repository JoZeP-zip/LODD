<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Contratos - Supabase + FastAPI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📋 Contratos</h1>
                <p>Conectado a Supabase • Backend FastAPI</p>
            </div>
            <button onclick="cargarContratos()" class="btn-secondary">
                🔄 Actualizar lista
            </button>
        </div>

        <!-- Formulario -->
        <div class="card">
            <h2>Nuevo Contrato</h2>
            <form id="contratoForm" onsubmit="insertarContrato(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Empresa</label>
                        <input type="text" id="empresa" required>
                    </div>
                    <div class="form-group">
                        <label>Nombre del contrato</label>
                        <input type="text" id="nombre" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Inicio</label>
                        <input type="date" id="fecha_ini" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Fin</label>
                        <input type="date" id="fecha_fin" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Cierre Máximo</label>
                        <input type="date" id="fecha_cierre_maximo" required>
                    </div>
                    <div class="form-group">
                        <label>Número</label>
                        <input type="text" id="numero" required>
                    </div>
                    <div class="form-group">
                        <label>Correo</label>
                        <input type="email" id="correo" required>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="estado" required>
                            <option value="activo">Activo</option>
                            <option value="pendiente">Pendiente</option>
                            <option value="cerrado">Cerrado</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit">💾 Guardar Contrato</button>
                </div>
            </form>

            <div id="mensaje" class="message"></div>
        </div>

        <!-- Tabla -->
        <div class="card">
            <h2>Contratos Registrados</h2>
            <div class="table-container">
                <table id="tablaContratos">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Empresa</th>
                            <th>Nombre</th>
                            <th>Inicio</th>
                            <th>Fin</th>
                            <th>Cierre Máx.</th>
                            <th>Número</th>
                            <th>Correo</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
<!-- Modal para Editar -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Contrato</h2>
                <button class="close-btn" onclick="cerrarModal()">✕</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="edit_id">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Empresa</label>
                        <input type="text" id="edit_empresa" required>
                    </div>
                    <div class="form-group">
                        <label>Nombre del contrato</label>
                        <input type="text" id="edit_nombre" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Inicio</label>
                        <input type="date" id="edit_fecha_ini" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Fin</label>
                        <input type="date" id="edit_fecha_fin" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Cierre Máximo</label>
                        <input type="date" id="edit_fecha_cierre_maximo" required>
                    </div>
                    <div class="form-group">
                        <label>Número</label>
                        <input type="text" id="edit_numero" required>
                    </div>
                    <div class="form-group">
                        <label>Correo</label>
                        <input type="email" id="edit_correo" required>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="edit_estado" required>
                            <option value="activo">Activo</option>
                            <option value="pendiente">Pendiente</option>
                            <option value="cerrado">Cerrado</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" onclick="cerrarModal()" class="btn-secondary">Cancelar</button>
                    <button type="submit">💾 Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
    <!-- ==================== MODAL EDITAR ==================== -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Editar Contrato</h2>
                <button class="close-btn" onclick="cerrarModal()">✕</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="edit_id">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Empresa</label>
                        <input type="text" id="edit_empresa" required>
                    </div>
                    <div class="form-group">
                        <label>Nombre del contrato</label>
                        <input type="text" id="edit_nombre" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Inicio</label>
                        <input type="date" id="edit_fecha_ini" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Fin</label>
                        <input type="date" id="edit_fecha_fin" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Cierre Máximo</label>
                        <input type="date" id="edit_fecha_cierre_maximo" required>
                    </div>
                    <div class="form-group">
                        <label>Número</label>
                        <input type="text" id="edit_numero" required>
                    </div>
                    <div class="form-group">
                        <label>Correo</label>
                        <input type="email" id="edit_correo" required>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="edit_estado" required>
                            <option value="activo">Activo</option>
                            <option value="pendiente">Pendiente</option>
                            <option value="cerrado">Cerrado</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" onclick="cerrarModal()" class="btn-secondary">Cancelar</button>
                    <button type="submit">💾 Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <scrip src="dragon.js"></script>
</body>
</html>
